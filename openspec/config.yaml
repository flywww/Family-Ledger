schema: spec-driven

context: |
  Project: Family Ledger.
  Stack: Next.js App Router, React Server Components, TypeScript, Tailwind, shadcn/ui, Radix primitives, Recharts, Prisma, NextAuth.

  Config role:
  This file is a concise routing and enforcement layer.
  It must not duplicate full design, architecture, data, or testing documents.

  Doc routing:
  - UI/design changes -> docs/design-system.md
  - UI inconsistency -> docs/design/design-consistency-conflicts.md
  - Validation harness changes -> docs/validation-harness.md
  - Architecture/data-flow changes -> docs/architecture-guide.md
  - Data model, month, money, currency, refresh-state changes -> docs/data-model-guide.md
  - Testing strategy or test-harness changes -> docs/testing-strategy.md
  - Staged requirements or deferred feature scope -> docs/feature-backlog.md
  - TDD, behavior tests, mocking boundaries, interface design for testability, deep modules, refactoring evidence, or Codex Plan Mode TDD contracts -> docs/testing-strategy.md
  - Planning protocol, plan revisions, readiness checks, or AI-agent discussion workflow -> docs/agent-development-workflow.md
  - Repo commands/navigation -> AGENTS.md
  - Deployment and archive readiness -> AGENTS.md, docs/testing-strategy.md, docs/validation-harness.md

  Core gate:
  Durable-rule validation path. Every durable rule added in a proposal, design, spec, or task must name an automated check or manual review path and map to docs/validation-harness.md.

  Agent-led deployment gate:
  For deployable OpenSpec changes, agents must lead the maintainer through local validation, commit/push, Vercel deployment, deployed smoke check, evidence recording, and archive as explicit checkpoints. If the user skips a checkpoint, the agent must warn what evidence will be missing before continuing.

rules:
  proposal:
    - Identify affected areas and the relevant source-of-truth docs to read.
    - For UI/design changes, classify visual impact as none, small, medium, or large.
    - For UI/design changes, state reusable component impact: reuse existing component, extend existing component, add reusable component, or one-off screen component with reason.
    - For behavior-changing work, identify the affected behavior, public interface under test, validation impact, and TDD path.
    - For non-trivial or revised plans, preserve prior approved detail and use the Planning Protocol in docs/agent-development-workflow.md before implementation.
    - State validation impact: existing validation, new validation, or manual review path.
    - Keep OpenSpec config concise; route to source docs instead of duplicating them.
  specs:
    - Use testable requirements that can map to scripts, linters, tests, visual checks, or manual review.
    - Include source-rule-to-validation mapping for new durable rules.
  design:
    - Include validation strategy for cross-cutting changes, UI changes, data-model changes, or new dependencies.
    - For UI/design changes, follow docs/design-system.md Visual Review and prototype rules.
    - For UI changes, read docs/design-system.md and record unresolved conflicts in docs/design/design-consistency-conflicts.md.
    - For architecture or data-flow changes, read docs/architecture-guide.md.
    - For data-model, month, money, currency, and refresh-state changes, read docs/data-model-guide.md.
    - For testing strategy or harness changes, read docs/testing-strategy.md and docs/validation-harness.md.
    - For behavior-changing work, include TDD Design covering behavior tests, mocking, interface design, module depth, and refactoring checkpoints.
  tasks:
    - Read only the source docs relevant to the current change.
    - Inspect existing checks before adding validation; add or update checks only when a durable rule needs them.
    - For behavior-changing work, include TDD behavior, Public interface, Test command, Mocking, Module depth, RED, GREEN, REFACTOR, and VALIDATE.
    - For DB-backed behavior, use Test command: npm run test unless the task explicitly explains why no DB behavior is implemented.
    - For UI/design changes, include the matching visual review and prototype tasks before implementation.
    - For existing UI workflow integration sections, require create-and-visible proof: verify the create/submit path writes data and the list/detail/read path visibly shows the created data under the relevant filters or views.
    - When reusable components are added or changed, update docs/design-system.md and docs/design-system.html in the same task.
    - Run npm run harness:check when available, or list the closest available commands if it is not available.
    - Run focused tests relevant to changed behavior.
    - For deployment-sensitive changes, identify direct main vs branch/worktree path, Vercel Preview needs, production verification, skipped checks, and manual-only deployment rules before archive.
    - For deployable changes, use agent-led checkpoints: ask before moving from validation to push, from push to deployment verification, from deployment verification to smoke check when production access is involved, and from smoke check to archive.
    - If the user asks to skip a deployment checkpoint or archive early, warn which checkpoint is being skipped and require explicit confirmation before continuing.
    - Report skipped checks, failing checks, and manual-only rules in change notes.
    - Keep tasks scoped to the current change; do not bundle unrelated design or architecture cleanup unless the proposal explicitly includes it.
